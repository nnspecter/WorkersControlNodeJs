version: '3.8'

services:
  # Сервис базы данных
  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: workers-control
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Сервис вашего Express приложения
  app:
    build: .
    container_name: express_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Обратите внимание: DB_HOST совпадает с именем сервиса базы (postgres_db)
      DB_HOST: postgres_db
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: workers-control
      DB_PORT: 5432
    depends_on:
      - postgres_db

volumes:
  pgdata: